<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% block title %}Notes{% endblock %} — pr-review-demo-app</title>
  <style>
    body { font: 16px/1.5 system-ui, sans-serif; max-width: 720px;
           margin: 2em auto; padding: 0 1em; color: #1f2328; }
    header { display: flex; justify-content: space-between;
             border-bottom: 1px solid #d0d7de; padding-bottom: 0.5em;
             margin-bottom: 1em; }
    a { color: #1f6feb; }
    form.inline { display: inline; }
    input, textarea { font: inherit; padding: 0.25em 0.5em; }
    button { font: inherit; padding: 0.25em 0.75em; cursor: pointer; }
    .error { color: #cf222e; }
    ul.notes { list-style: none; padding: 0; }
    ul.notes li { padding: 0.5em 0; border-bottom: 1px solid #f0f0f0; }
  </style>
</head>
<body>
  {% if user %}
  <header>
    <span>Logged in as <strong>{{ user.username }}</strong></span>
    <form method="post" action="{{ url_for('logout') }}" class="inline">
      <button type="submit">Log out</button>
    </form>
  </header>
  {% endif %}
  {% block content %}{% endblock %}
</body>
</html>
