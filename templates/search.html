{% extends "base.html" %}
{% block title %}Search{% endblock %}
{% block content %}
<p><a href="{{ url_for('dashboard') }}">&larr; Back to dashboard</a></p>
<h1>Search results for &ldquo;{{ q }}&rdquo;</h1>
{% if notes %}
<ul class="notes">
  {% for note in notes %}
  <li>{{ note.title }}</li>
  {% endfor %}
</ul>
{% else %}
<p>No matches.</p>
{% endif %}
{% endblock %}
