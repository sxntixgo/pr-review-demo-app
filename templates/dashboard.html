{% extends "base.html" %}
{% block title %}Dashboard{% endblock %}
{% block content %}
<h1>Your notes</h1>
{% if notes %}
<ul class="notes">
  {% for note in notes %}
  <li><a href="{{ url_for('view_note', note_id=note.id) }}">{{ note.title }}</a></li>
  {% endfor %}
</ul>
{% else %}
<p>You have no notes yet.</p>
{% endif %}
{% endblock %}
